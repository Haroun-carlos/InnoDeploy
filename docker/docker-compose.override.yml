services:
  traefik:
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
  backend:
    labels:
      traefik.http.routers.innodeploy-api.rule: "Host(`inverp.cloud`) && PathPrefix(`/api`)"
      traefik.http.routers.innodeploy-api.priority: "100"
  websocket:
    labels:
      traefik.http.routers.innodeploy-ws.rule: "Host(`inverp.cloud`) && (PathPrefix(`/ws`) || PathPrefix(`/socket.io`))"
      traefik.http.routers.innodeploy-ws.priority: "100"
  dashboard:
    labels:
      traefik.http.routers.innodeploy-app.rule: "Host(`inverp.cloud`)"
      traefik.http.routers.innodeploy-app.priority: "1"
networks:
  innodeploy-net:
    driver_opts:
      com.docker.network.driver.mtu: "1420"

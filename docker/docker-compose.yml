services:
  # ── Traefik Reverse Proxy ───────────────────────────────
  traefik:
    image: traefik:latest
    container_name: innodeploy-traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --api.dashboard=${TRAEFIK_DASHBOARD_ENABLED:-false}
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/etc/traefik/acme
    networks:
      - innodeploy-net
    environment:
      - DOCKER_API_VERSION=1.41

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - traefik
      - mongodb
      - redis
      - minio
    labels:
      - traefik.enable=true
      - traefik.http.routers.innodeploy-api.rule=Host(`${TRAEFIK_API_HOST:-api.localhost}`)
      - traefik.http.routers.innodeploy-api.entrypoints=websecure
      - traefik.http.routers.innodeploy-api.tls=true
      - traefik.http.routers.innodeploy-api.tls.certresolver=letsencrypt
      - traefik.http.services.innodeploy-api.loadbalancer.server.port=5000
      - traefik.http.middlewares.innodeploy-ratelimit.ratelimit.average=${TRAEFIK_RATE_LIMIT_AVERAGE:-120}
      - traefik.http.middlewares.innodeploy-ratelimit.ratelimit.burst=${TRAEFIK_RATE_LIMIT_BURST:-60}
      - traefik.http.middlewares.innodeploy-ipallow.ipallowlist.sourcerange=${TRAEFIK_IP_ALLOWLIST:-0.0.0.0/0,::/0}
      - traefik.http.middlewares.innodeploy-staging-auth.basicauth.users=${TRAEFIK_STAGING_BASIC_AUTH_USERS:-}
      - traefik.http.middlewares.innodeploy-chain.chain.middlewares=innodeploy-ratelimit,innodeploy-ipallow
      - traefik.http.routers.innodeploy-api.middlewares=innodeploy-chain@docker${TRAEFIK_ENABLE_STAGING_AUTH:+,innodeploy-staging-auth@docker}
    networks:
      - innodeploy-net

  # ── WebSocket Gateway ───────────────────────────────────
  websocket:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/services/websocketGateway.js"]
    env_file:
      - ../backend/.env
    depends_on:
      - traefik
      - redis
    labels:
      - traefik.enable=true
      - traefik.http.routers.innodeploy-ws.rule=Host(`${TRAEFIK_WS_HOST:-ws.localhost}`)
      - traefik.http.routers.innodeploy-ws.entrypoints=websecure
      - traefik.http.routers.innodeploy-ws.tls=true
      - traefik.http.routers.innodeploy-ws.tls.certresolver=letsencrypt
      - traefik.http.services.innodeploy-ws.loadbalancer.server.port=7070
      - traefik.http.routers.innodeploy-ws.middlewares=innodeploy-chain@docker
    networks:
      - innodeploy-net

  # ── Dashboard (Next.js) ────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:7070}
    restart: unless-stopped
    depends_on:
      - traefik
      - backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.innodeploy-app.rule=Host(`${TRAEFIK_APP_HOST:-app.localhost}`)
      - traefik.http.routers.innodeploy-app.entrypoints=websecure
      - traefik.http.routers.innodeploy-app.tls=true
      - traefik.http.routers.innodeploy-app.tls.certresolver=letsencrypt
      - traefik.http.services.innodeploy-app.loadbalancer.server.port=3000
      - traefik.http.routers.innodeploy-app.middlewares=innodeploy-chain@docker
    networks:
      - innodeploy-net

  # ── Pipeline Runner ─────────────────────────────────────
  pipeline-runner:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/workers/pipelineRunnerMain.js"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      PIPELINE_RUNNER_ENABLED: "true"
      OBJECT_STORE_ENABLED: "true"
    env_file:
      - ../backend/.env
    depends_on:
      - mongodb
      - redis
      - minio
    networks:
      - innodeploy-net

  # ── Deploy Worker ───────────────────────────────────────
  deploy-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/workers/deployWorkerMain.js"]
    environment:
      DEPLOY_WORKER_ENABLED: "true"
    env_file:
      - ../backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - innodeploy-net

  # ── Monitor Worker ─────────────────────────────────────
  monitor-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "src/workers/monitorWorkerMain.js"]
    environment:
      MONITOR_WORKER_ENABLED: "true"
    env_file:
      - ../backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - mongodb
      - redis
    networks:
      - innodeploy-net

  # ── Object Store (build artifacts) ──────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: innodeploy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - innodeploy-net

  # ── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: innodeploy-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - innodeploy-net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: innodeploy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - innodeploy-net

  # ── Vector Store (optional) ────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9
    container_name: innodeploy-qdrant
    restart: unless-stopped
    profiles:
      - aiops
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - innodeploy-net

  # ── LLM Runtime (optional) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: innodeploy-ollama
    restart: unless-stopped
    profiles:
      - aiops
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - innodeploy-net
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu] # optional GPU passthrough

  anomaly-detector:
    build: ../packages/anomaly-detector
    profiles:
      - aiops
    depends_on:
      - redis
      - qdrant
    networks:
      - innodeploy-net

volumes:
  traefik-acme:
  mongo-data:
  redis-data:
  minio-data:
  qdrant_data:
  ollama_models:

networks:
  innodeploy-net:
    driver: bridge

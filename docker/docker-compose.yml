version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: innodeploy-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - innodeploy-net

  # ── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: innodeploy-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - innodeploy-net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: innodeploy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - innodeploy-net

volumes:
  mongo-data:
  redis-data:

networks:
  innodeploy-net:
    driver: bridge
